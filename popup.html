<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>刚刚好</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>💪 刚刚好</h1>
      <p class="subtitle">关爱盆底健康，从现在开始</p>
    </header>

    <section class="stats">
      <div class="stat-item">
        <div class="stat-value" id="totalSessions">0</div>
        <div class="stat-label">总练习次数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="todaySessions">0</div>
        <div class="stat-label">今日练习</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="streak">0</div>
        <div class="stat-label">连续天数</div>
      </div>
    </section>

    <section class="controls">
      <div class="control-item">
        <label class="switch">
          <input type="checkbox" id="enableToggle" checked>
          <span class="slider"></span>
        </label>
        <span class="control-label">启用提醒</span>
      </div>

      <div class="control-item">
        <label for="intervalSelect">提醒间隔</label>
        <select id="intervalSelect">
          <option value="30">30分钟</option>
          <option value="45" selected>45分钟</option>
          <option value="60">1小时</option>
          <option value="90">1.5小时</option>
          <option value="120">2小时</option>
        </select>
      </div>

      <div class="control-item">
        <label for="repsSelect">练习次数</label>
        <select id="repsSelect">
          <option value="10">10次</option>
          <option value="15" selected>15次</option>
          <option value="20">20次</option>
        </select>
      </div>

      <div class="control-item">
        <label for="contractSelect">收缩时长</label>
        <select id="contractSelect">
          <option value="3">3秒</option>
          <option value="5" selected>5秒</option>
          <option value="8">8秒</option>
          <option value="10">10秒</option>
        </select>
      </div>

      <div class="control-item">
        <label for="relaxSelect">放松时长</label>
        <select id="relaxSelect">
          <option value="5">5秒</option>
          <option value="10" selected>10秒</option>
          <option value="15">15秒</option>
        </select>
      </div>

      <div class="control-item">
        <label for="startTimeSelect">工作时段开始</label>
        <select id="startTimeSelect">
          <option value="0">不限制</option>
          <option value="7">7:00</option>
          <option value="8">8:00</option>
          <option value="9" selected>9:00</option>
          <option value="10">10:00</option>
        </select>
      </div>

      <div class="control-item">
        <label for="endTimeSelect">工作时段结束</label>
        <select id="endTimeSelect">
          <option value="24">不限制</option>
          <option value="17">17:00</option>
          <option value="18" selected>18:00</option>
          <option value="19">19:00</option>
          <option value="20">20:00</option>
          <option value="22">22:00</option>
        </select>
      </div>

      <div class="control-item">
        <label class="switch">
          <input type="checkbox" id="soundToggle">
          <span class="slider"></span>
        </label>
        <span class="control-label">音效提示</span>
      </div>
    </section>

    <section class="exercise-guide">
      <h2>🎯 提肛运动指南</h2>

      <div class="step">
        <div class="step-number">1</div>
        <div class="step-content">
          <h3>准备姿势</h3>
          <p>坐直或平躺，全身放松，保持自然呼吸</p>
        </div>
      </div>

      <div class="step">
        <div class="step-number">2</div>
        <div class="step-content">
          <h3>收缩盆底肌</h3>
          <p>像憋尿、憋便那样收紧肛门和会阴部，保持5-10秒</p>
        </div>
      </div>

      <div class="step">
        <div class="step-number">3</div>
        <div class="step-content">
          <h3>放松休息</h3>
          <p>完全放松盆底肌肉，休息10秒</p>
        </div>
      </div>

      <div class="step">
        <div class="step-number">4</div>
        <div class="step-content">
          <h3>重复练习</h3>
          <p>重复以上动作10-15次为一组</p>
        </div>
      </div>
    </section>

    <section class="benefits">
      <h3>💡 健康益处</h3>
      <ul>
        <li>改善盆底肌功能，预防尿失禁</li>
        <li>促进局部血液循环</li>
        <li>缓解久坐带来的不适</li>
        <li>改善性功能</li>
        <li>预防痔疮等肛肠疾病</li>
      </ul>
    </section>

    <button id="startNow" class="action-button">立即开始练习</button>

    <footer>
      <p class="tip">💡 建议每天练习3-5组，持之以恒效果更佳</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
