<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>刚刚好 - 运动指南</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-flex">
        <div>
          <h1>🎯 运动指南</h1>
          <p class="subtitle">提肛运动方法与健康益处</p>
        </div>
        <button id="closeBtn" class="icon-btn">✕</button>
      </div>
    </header>

    <section class="exercise-guide">
      <h2>提肛运动步骤</h2>

      <div class="step">
        <div class="step-number">1</div>
        <div class="step-content">
          <h3>准备姿势</h3>
          <p>坐直或平躺，全身放松，保持自然呼吸</p>
        </div>
      </div>

      <div class="step">
        <div class="step-number">2</div>
        <div class="step-content">
          <h3>收缩盆底肌</h3>
          <p>像憋尿、憋便那样收紧肛门和会阴部，保持5-10秒</p>
        </div>
      </div>

      <div class="step">
        <div class="step-number">3</div>
        <div class="step-content">
          <h3>放松休息</h3>
          <p>完全放松盆底肌肉，休息10秒</p>
        </div>
      </div>

      <div class="step">
        <div class="step-number">4</div>
        <div class="step-content">
          <h3>重复练习</h3>
          <p>重复以上动作10-15次为一组</p>
        </div>
      </div>
    </section>

    <section class="benefits">
      <h3>💡 健康益处</h3>
      <ul>
        <li>改善盆底肌功能，预防尿失禁</li>
        <li>促进局部血液循环</li>
        <li>缓解久坐带来的不适</li>
        <li>改善性功能</li>
        <li>预防痔疮等肛肠疾病</li>
      </ul>
    </section>

    <footer>
      <p class="tip">💡 建议每天练习3-5组，持之以恒效果更佳</p>
    </footer>
  </div>

  <script src="help.js"></script>
</body>
</html>
