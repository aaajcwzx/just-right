<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>生成图标 - 方案1</title>
  <style>
    body {
      font-family: -apple-system, 'Microsoft YaHei', sans-serif;
      background: oklch(96% 0.005 260);
      padding: 40px;
      text-align: center;
    }
    h1 { font-size: 20px; margin-bottom: 24px; color: #2d3f6b; }
    .preview { display: flex; gap: 24px; justify-content: center; margin-bottom: 24px; }
    .preview canvas { border-radius: 22%; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    button {
      background: #2d3f6b; color: white; border: none;
      padding: 12px 28px; border-radius: 6px; font-size: 15px;
      cursor: pointer;
    }
    button:hover { background: #243358; }
    #status { margin-top: 20px; color: #555; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>刚刚好 · 图标生成（方案1 抽象几何）</h1>
  <div class="preview">
    <canvas id="c128" width="128" height="128"></canvas>
    <canvas id="c48" width="48" height="48"></canvas>
    <canvas id="c16" width="16" height="16"></canvas>
  </div>
  <button onclick="downloadAll()">下载全部图标</button>
  <div id="status"></div>

  <script>
    // 绘制图标到指定 canvas
    function draw(canvas, size) {
      const ctx = canvas.getContext('2d');
      const s = size / 80; // 基于 80 网格缩放

      // 背景
      ctx.fillStyle = '#2d3f6b';
      ctx.fillRect(0, 0, size, size);

      // 圆角裁切（通过先画背景再叠加，简单填满即可，圆角由展示层处理）
      // 三段竖条
      function bar(x, y, w, h, color) {
        const r = 2 * s;
        const X = x * s, Y = y * s, W = w * s, H = h * s;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(X + r, Y);
        ctx.arcTo(X + W, Y, X + W, Y + H, r);
        ctx.arcTo(X + W, Y + H, X, Y + H, r);
        ctx.arcTo(X, Y + H, X, Y, r);
        ctx.arcTo(X, Y, X + W, Y, r);
        ctx.closePath();
        ctx.fill();
      }

      bar(20, 44, 11, 20, '#7d9bd6');
      bar(34.5, 24, 11, 40, '#aec4ee');
      bar(49, 36, 11, 28, '#7d9bd6');
    }

    draw(document.getElementById('c128'), 128);
    draw(document.getElementById('c48'), 48);
    draw(document.getElementById('c16'), 16);

    async function downloadOne(canvas, name) {
      const blob = await new Promise(r => canvas.toBlob(r));
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function downloadAll() {
      await downloadOne(document.getElementById('c128'), 'icon128.png');
      await new Promise(r => setTimeout(r, 200));
      await downloadOne(document.getElementById('c48'), 'icon48.png');
      await new Promise(r => setTimeout(r, 200));
      await downloadOne(document.getElementById('c16'), 'icon16.png');

      document.getElementById('status').innerHTML =
        '✅ 三个图标已下载<br>请将 icon16.png / icon48.png / icon128.png 移动到插件的 <strong>icons</strong> 目录';
    }
  </script>
</body>
</html>
