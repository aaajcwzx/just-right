<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图标生成器</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #667eea;
      margin-bottom: 20px;
    }
    .icon-preview {
      display: flex;
      gap: 20px;
      margin: 30px 0;
      justify-content: center;
    }
    canvas {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      margin: 10px 5px;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .info {
      background: #f8f9fa;
      padding: 15px;
      border-left: 4px solid #667eea;
      margin: 20px 0;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💪 刚刚好 - 图标生成器</h1>

    <div class="info">
      <p>这个工具可以快速生成插件所需的三个尺寸的图标文件。</p>
      <p>点击下方按钮生成并下载图标。</p>
    </div>

    <div class="icon-preview">
      <div>
        <canvas id="icon16" width="16" height="16"></canvas>
        <p style="text-align: center; margin-top: 8px; font-size: 12px;">16x16</p>
      </div>
      <div>
        <canvas id="icon48" width="48" height="48"></canvas>
        <p style="text-align: center; margin-top: 8px; font-size: 12px;">48x48</p>
      </div>
      <div>
        <canvas id="icon128" width="128" height="128"></canvas>
        <p style="text-align: center; margin-top: 8px; font-size: 12px;">128x128</p>
      </div>
    </div>

    <div style="text-align: center;">
      <button onclick="generateIcons()">生成图标</button>
      <button onclick="downloadAll()">下载全部</button>
    </div>

    <div class="info" style="margin-top: 30px;">
      <strong>使用说明：</strong>
      <ol style="margin: 10px 0; padding-left: 20px;">
        <li>点击「生成图标」查看预览</li>
        <li>点击「下载全部」保存所有图标</li>
        <li>将下载的图标文件放入 <code>icons</code> 目录</li>
      </ol>
    </div>
  </div>

  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');

      // 渐变背景
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#667eea');
      gradient.addColorStop(1, '#764ba2');

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      // 绘制💪图标
      ctx.fillStyle = 'white';
      ctx.font = `bold ${size * 0.6}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💪', size / 2, size / 2);
    }

    function generateIcons() {
      drawIcon(document.getElementById('icon16'), 16);
      drawIcon(document.getElementById('icon48'), 48);
      drawIcon(document.getElementById('icon128'), 128);
    }

    function downloadCanvas(canvas, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadAll() {
      generateIcons();

      setTimeout(() => {
        downloadCanvas(document.getElementById('icon16'), 'icon16.png');
      }, 100);

      setTimeout(() => {
        downloadCanvas(document.getElementById('icon48'), 'icon48.png');
      }, 300);

      setTimeout(() => {
        downloadCanvas(document.getElementById('icon128'), 'icon128.png');
      }, 500);

      alert('图标已生成！请将下载的文件放入 icons 目录。');
    }

    // 页面加载时自动生成预览
    window.onload = generateIcons;
  </script>
</body>
</html>
