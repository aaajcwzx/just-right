<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开始练习</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .exercise-container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 20px;
    }

    .timer {
      font-size: 72px;
      font-weight: bold;
      color: #667eea;
      margin: 30px 0;
      font-variant-numeric: tabular-nums;
    }

    .phase {
      font-size: 24px;
      color: #666;
      margin-bottom: 20px;
      min-height: 32px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 30px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      width: 0%;
      transition: width 0.3s ease;
    }

    .counter {
      font-size: 18px;
      color: #666;
      margin-bottom: 30px;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    button {
      padding: 12px 32px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #e0e0e0;
      color: #666;
    }

    .btn-secondary:hover {
      background: #d0d0d0;
    }

    .instruction {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
      border-radius: 4px;
    }

    .instruction p {
      line-height: 1.6;
      color: #555;
    }

    .completion {
      display: none;
    }

    .completion.show {
      display: block;
    }

    .completion-icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="exercise-container">
    <div id="exerciseView">
      <h1>💪 盆底肌锻炼</h1>

      <div class="timer" id="timer">5</div>
      <div class="phase" id="phase">准备开始</div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressBar"></div>
      </div>

      <div class="counter" id="counter">第 0 / 15 次</div>

      <div class="instruction">
        <p id="instruction">点击"开始练习"按钮，跟随提示完成锻炼</p>
      </div>

      <div class="controls">
        <button class="btn-primary" id="startBtn">开始练习</button>
        <button class="btn-secondary" id="closeBtn">关闭</button>
      </div>
    </div>

    <div class="completion" id="completionView">
      <div class="completion-icon">🎉</div>
      <h1>完成练习！</h1>
      <p style="margin: 20px 0; color: #666; font-size: 16px;">
        恭喜你完成了一组盆底肌锻炼！<br>
        坚持练习，健康常伴。
      </p>
      <button class="btn-primary" id="restartBtn">再练一组</button>
      <button class="btn-secondary" id="doneBtn" style="margin-left: 12px;">完成</button>
    </div>
  </div>

  <script src="exercise.js"></script>
</body>
</html>
